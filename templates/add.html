{% extends "base.html" %}

{% block title %}
Додати телефон
{% endblock %}

{% block content %}

<h2>Додати телефон</h2>

<form method="POST">

<input name="firm" placeholder="Фірма" class="form-control mb-2">
<input name="name" placeholder="Назва" class="form-control mb-2">
<input name="price" placeholder="Ціна" type="number" class="form-control mb-2">
<input name="cameras" placeholder="Кількість камер" type="number" class="form-control mb-2">

<button class="btn btn-primary">Додати</button>

</form>

{% endblock %}
